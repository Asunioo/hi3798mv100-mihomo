name: 清理Mihomo编译构建历史记录

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  clean_build:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: 删除旧构建运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          keep_minimum_runs: 5
          retain_days: 0
          workflow_name: "Build Mihomo armv7 for Linux 4.4 (Dispatch)"

      - name: 清理自身运行记录（无痕执行）
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run delete ${{ github.run_id }}
