name: Build Latest Mihomo for Hi3798MV100 (Auto-Patch Go Runtime)

on:
  workflow_dispatch:
    inputs:
      mihomo_ref:
        description: 'Mihomo branch/tag (default: main)'
        required: true
        default: 'main'
      go_version:
        description: 'Go version (>= 1.23 for latest mihomo)'
        required: true
        default: '1.24.4'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ github.event.inputs.go_version }}
          check-latest: true

      - name: Clone mihomo source
        run: |
          # 克隆 main 分支（mihomo 当前的活跃默认分支）
          git clone --depth 1 --branch ${{ github.event.inputs.mihomo_ref }} \
            https://github.com/MetaCubeX/mihomo.git mihomo-src
          
          echo "=== Verify checkout ==="
          cd mihomo-src
          ls -la
          
          if [ ! -f "go.mod" ]; then
            echo "::error::go.mod not found! Something is wrong with the checkout."
            exit 1
          fi
          echo "✅ go.mod found. Current commit: $(git rev-parse --short HEAD)"

      - name: Patch Go runtime (Multi-Strategy Auto-Patch)
        run: |
          set -e
          GOROOT=$(go env GOROOT)
          RUNTIME_DIR="${GOROOT}/src/runtime"
          
          echo "=== Go Runtime Info ==="
          echo "GOROOT: $GOROOT"
          go version
          
          PATCH_SUCCESS=0
          
          # 策略 1: 重写 configure64bitsTimeOn32BitsArchitectures 为空函数 (最彻底)
          FILE_CFG=$(grep -rl "func configure64bitsTimeOn32BitsArchitectures" "${RUNTIME_DIR}" 2>/dev/null | head -n 1 || true)
          if [ -n "$FILE_CFG" ]; then
            echo "🎯 Strategy 1: Patching configure64bitsTimeOn32BitsArchitectures in $FILE_CFG"
            awk '
              /^func configure64bitsTimeOn32BitsArchitectures/ {
                print $0
                print "\t// Patched: bypass kernel version check for custom ROMs"
                print "\treturn"
                print "}"
                skip = 1
                next
              }
              skip && /^}/ {
                skip = 0
                next
              }
              !skip { print }
            ' "$FILE_CFG" > "$FILE_CFG.tmp" && mv "$FILE_CFG.tmp" "$FILE_CFG"
            
            if grep -q "bypass kernel version check" "$FILE_CFG"; then
              echo "✅ Strategy 1 Success"
              PATCH_SUCCESS=1
            fi
          fi
          
          # 策略 2: 替换 getKernelVersion 中的 throw (兼容旧版 Go)
          if [ "$PATCH_SUCCESS" -eq 0 ]; then
            FILE_KV=$(grep -rl "func getKernelVersion" "${RUNTIME_DIR}" 2>/dev/null | head -n 1 || true)
            if [ -n "$FILE_KV" ]; then
              echo "🎯 Strategy 2: Patching getKernelVersion in $FILE_KV"
              sed -i 's/throw("failed to parse kernel version from uname")/return 0, 0, 0/g' "$FILE_KV"
              sed -i 's/throw("failed to parse kernel version")/return 0, 0, 0/g' "$FILE_KV"
              sed -i 's/throw(.*parse.*kernel.*)/return 0, 0, 0/g' "$FILE_KV"
              
              if ! grep -q 'throw(.*parse.*kernel' "$FILE_KV"; then
                echo "✅ Strategy 2 Success"
                PATCH_SUCCESS=1
              fi
            fi
          fi
          
          # 策略 3: 暴力兜底
          if [ "$PATCH_SUCCESS" -eq 0 ]; then
            echo "🎯 Strategy 3: Brute-force patch"
            find "${RUNTIME_DIR}" -name "*.go" -exec sed -i 's/throw(.*parse.*kernel.*)/return/g' {} +
            find "${RUNTIME_DIR}" -name "*.go" -exec sed -i 's/throw(.*failed to parse.*)/return/g' {} +
            PATCH_SUCCESS=1
          fi
          
          if [ "$PATCH_SUCCESS" -eq 0 ]; then
            echo "::error::All patch strategies failed!"
            exit 1
          fi
          echo "🎉 Go runtime patched!"

      - name: Install UPX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq upx-ucl

      - name: Build mihomo (static, armv7)
        working-directory: mihomo-src
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm
          GOARM: "7"
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "${{ github.event.inputs.mihomo_ref }}-$(git rev-parse --short HEAD)")
          echo "Building mihomo ${VERSION} with $(go version)"
          
          go build \
            -trimpath \
            -ldflags "-s -w -X 'github.com/metacubex/mihomo/constant.Version=${VERSION}' -extldflags '-static'" \
            -o mihomo-linux-armv7 \
            .

      - name: Compress with UPX
        working-directory: mihomo-src
        run: |
          ls -lh mihomo-linux-armv7
          upx --best --lzma mihomo-linux-armv7 || echo "UPX skipped"
          ls -lh mihomo-linux-armv7

      - name: Verify binary
        working-directory: mihomo-src
        run: |
          file mihomo-linux-armv7
          if ! file mihomo-linux-armv7 | grep -q "ELF 32-bit LSB executable, ARM"; then
            echo "::error::Not a valid ARM 32-bit ELF"
            exit 1
          fi
          echo "✅ Binary verified: ARM 32-bit ELF, statically linked"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-linux-armv7-latest-patched
          path: mihomo-src/mihomo-linux-armv7
          retention-days: 30
