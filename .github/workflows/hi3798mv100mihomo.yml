name: Build Mihomo armv7 for Linux 4.4 (Auto Update)
on:
  workflow_dispatch:
    inputs:
      force_build:
        description: '强制重新构建（忽略版本缓存）'
        type: boolean
        default: true
  schedule:
    - cron: '0 */6 * * *'  # 每6小时自动检测一次新版本（UTC时间）

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      latest_tag: ${{ steps.get_version.outputs.latest_tag }}
      skip_build: ${{ steps.skip_decision.outputs.skip_build }}
    
    steps:
      - name: Checkout 当前仓库
        uses: actions/checkout@v4

      # 1. 获取 mihomo 官方最新正式版本号
      - name: 获取 mihomo 最新 release 版本
        id: get_version
        run: |
          LATEST_TAG=$(curl -s \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
            | grep -oP '"tag_name": "\K(.*)(?=")')
          
          if [ -z "$LATEST_TAG" ]; then
            echo "错误：无法获取最新版本号"
            exit 1
          fi
          
          echo "检测到 mihomo 最新正式版: $LATEST_TAG"
          echo "触发方式: ${{ github.event_name }}"
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      # 2. 仅定时运行时读取版本缓存，手动运行直接跳过缓存判断
      - name: 读取上次构建版本（仅定时触发生效）
        id: check_version
        if: github.event_name == 'schedule'
        uses: actions/cache@v4
        with:
          path: .last_build_version
          key: mihomo-last-build-${{ steps.get_version.outputs.latest_tag }}
      
      - name: 判断是否跳过构建
        id: skip_decision
        run: |
          # 手动触发：默认强制构建，不跳过
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.force_build }}" = "true" ]; then
              echo "手动触发，强制构建"
              echo "skip_build=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          
          # 定时触发：检查版本缓存
          if [ -f .last_build_version ]; then
            LAST_VER=$(cat .last_build_version)
            if [ "$LAST_VER" = "${{ steps.get_version.outputs.latest_tag }}" ]; then
              echo "当前版本 $LAST_VER 已构建过，跳过本次构建"
              echo "skip_build=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          
          echo "检测到新版本，开始构建"
          echo "skip_build=false" >> $GITHUB_OUTPUT

      # ========== 以下步骤仅在不跳过时执行 ==========
      - name: 安装 ARM 交叉编译工具链
        if: steps.skip_decision.outputs.skip_build == 'false'
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-linux-gnueabihf libc6-dev-armhf-cross wget tar
          arm-linux-gnueabihf-gcc --version

      # 核心修复：固定 Go 1.23 版本，该版本兼容 Linux 4.4 + LD_PRELOAD 劫持
      - name: 配置 Go 1.23 稳定编译环境
        if: steps.skip_decision.outputs.skip_build == 'false'
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false
          check-latest: true

      - name: 下载并解压最新版 mihomo 源码
        if: steps.skip_decision.outputs.skip_build == 'false'
        run: |
          TAG="${{ steps.get_version.outputs.latest_tag }}"
          wget -O src.tar.gz "https://github.com/MetaCubeX/mihomo/archive/refs/tags/${TAG}.tar.gz"
          tar -zxf src.tar.gz
          SRC_DIR=$(ls -d mihomo-*/ | head -1)
          mv "$SRC_DIR" mihomo
          cd mihomo
          ls -la go.mod main.go
          go env GOMOD

      - name: 编译 ARM 版 uname 内核伪装库
        if: steps.skip_decision.outputs.skip_build == 'false'
        run: |
          cat > uname_hack.c <<'EOF'
          #define _GNU_SOURCE
          #include <sys/utsname.h>
          #include <dlfcn.h>
          #include <string.h>

          int uname(struct utsname *buf) {
              static int (*orig_uname)(struct utsname *) = NULL;
              if (!orig_uname) orig_uname = dlsym(RTLD_NEXT, "uname");
              int ret = orig_uname(buf);
              strcpy(buf->release, "5.4.0-fake");
              return ret;
          }
          EOF
          arm-linux-gnueabihf-gcc -shared -fPIC -ldl uname_hack.c -o libfakeuname.so
          file libfakeuname.so

      - name: 静态编译 mihomo armv7 二进制
        if: steps.skip_decision.outputs.skip_build == 'false'
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: arm
          GOARM: 7
          CC: arm-linux-gnueabihf-gcc
          CXX: arm-linux-gnueabihf-g++
          GO111MODULE: on
        run: |
          cd mihomo
          TAG="${{ steps.get_version.outputs.latest_tag }}"
          go build \
            -ldflags "-w -s -X github.com/metacubex/mihomo/constant.Version=${TAG} -linkmode external -extldflags '-static'" \
            -tags "no_gvisor no_tun_newapi" \
            -o ../mihomo-linux-armv7-static
          cd ..
          chmod +x mihomo-linux-armv7-static
          file mihomo-linux-armv7-static

      - name: 打包发布制品（带版本号）
        if: steps.skip_decision.outputs.skip_build == 'false'
        run: |
          TAG="${{ steps.get_version.outputs.latest_tag }}"
          mkdir -p release
          cp mihomo-linux-armv7-static release/
          cp libfakeuname.so release/
          
          cat > release/run.sh <<'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          export LD_PRELOAD="$SCRIPT_DIR/libfakeuname.so"
          exec "$SCRIPT_DIR/mihomo-linux-armv7-static" -d "$SCRIPT_DIR" "$@"
          EOF
          chmod +x release/run.sh
          
          tar -zcf "mihomo-${TAG}-armv7-linux4.4.tar.gz" -C release .
          ls -lh "mihomo-${TAG}-armv7-linux4.4.tar.gz"

      - name: 上传构建产物
        if: steps.skip_decision.outputs.skip_build == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-${{ steps.get_version.outputs.latest_tag }}-armv7-linux4.4
          path: mihomo-${{ steps.get_version.outputs.latest_tag }}-armv7-linux4.4.tar.gz

      # 3. 构建成功后更新版本记录（仅定时触发时更新缓存）
      - name: 更新构建版本记录
        if: steps.skip_decision.outputs.skip_build == 'false' && success() && github.event_name == 'schedule'
        run: |
          echo "${{ steps.get_version.outputs.latest_tag }}" > .last_build_version
          echo "已记录本次构建版本: ${{ steps.get_version.outputs.latest_tag }}"
