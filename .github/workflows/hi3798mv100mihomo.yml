name: Build Mihomo armv7 Linux4.4 Static
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 本仓库
        uses: actions/checkout@v4

      - name: Checkout mihomo 官方源码
        uses: actions/checkout@v4
        with:
          repository: MetaCubeX/mihomo
          ref: main
          path: mihomo
          fetch-depth: 0

      # 安装 ARM 交叉编译工具链
      - name: Install ARM cross toolchain
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-linux-gnueabihf libc6-dev-armhf-cross
          arm-linux-gnueabihf-gcc --version

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23
          cache: true
          cache-dependency-path: mihomo/go.sum

      # 编译 ARM 版 uname 伪装库
      - name: Build armv7 libfakeuname.so
        run: |
          cat > uname_hack.c <<'EOF'
          #define _GNU_SOURCE
          #include <sys/utsname.h>
          #include <dlfcn.h>
          #include <string.h>

          int uname(struct utsname *buf) {
              static int (*orig_uname)(struct utsname *) = NULL;
              if (!orig_uname) orig_uname = dlsym(RTLD_NEXT, "uname");
              int ret = orig_uname(buf);
              strcpy(buf->release, "5.4.0-fake");
              return ret;
          }
          EOF
          # 用 ARM 交叉编译器编译
          arm-linux-gnueabihf-gcc -shared -fPIC -ldl uname_hack.c -o libfakeuname.so
          file libfakeuname.so

      # 静态编译 mihomo armv7
      - name: Compile mihomo armv7 static
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: arm
          GOARM: 7
          CC: arm-linux-gnueabihf-gcc
          CXX: arm-linux-gnueabihf-g++
        run: |
          cd mihomo
          # 强制模块模式，指定入口包路径
          go build \
            -ldflags "-w -s -X github.com/metacubex/mihomo/constant.Version=$(git describe --tags --always)" \
            -tags "no_gvisor no_tun_newapi" \
            -o ../mihomo-linux-armv7-static \
            ./cmd/mihomo
          cd ..
          chmod +x mihomo-linux-armv7-static
          file mihomo-linux-armv7-static

      # 打包制品
      - name: Package artifacts
        run: |
          mkdir -p release
          cp mihomo-linux-armv7-static release/
          cp libfakeuname.so release/
          
          cat > release/run.sh <<'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          export LD_PRELOAD="$SCRIPT_DIR/libfakeuname.so"
          exec "$SCRIPT_DIR/mihomo-linux-armv7-static" -d "$SCRIPT_DIR/config" "$@"
          EOF
          chmod +x release/run.sh
          
          tar -zcf mihomo-armv7-linux4.4.tar.gz -C release .
          ls -lh mihomo-armv7-linux4.4.tar.gz

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-armv7-linux4.4
          path: mihomo-armv7-linux4.4.tar.gz
