name: Build Mihomo armv7 Linux4.4 Static
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 当前仓库
        uses: actions/checkout@v4

      - name: 安装 ARM 交叉编译工具链
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-linux-gnueabihf libc6-dev-armhf-cross wget tar
          arm-linux-gnueabihf-gcc --version

      - name: Setup Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: 1.23
          cache: false

      # 核心修复：压缩包改名避免前缀冲突 + 精准匹配目录 + 校验文件
      - name: 下载并解压 mihomo 源码
        run: |
          # 压缩包改名，避免和源码目录前缀冲突
          wget -O src.tar.gz https://github.com/MetaCubeX/mihomo/archive/refs/tags/v1.19.25.tar.gz
          tar -zxf src.tar.gz
          # 精准匹配解压后的目录并重命名
          SRC_DIR=$(ls -d mihomo-*/ | head -1)
          mv "$SRC_DIR" mihomo
          # 校验核心文件
          cd mihomo
          ls -la go.mod main.go
          go env GOMOD

      - name: 编译 armv7 版 uname 伪装库
        run: |
          cat > uname_hack.c <<'EOF'
          #define _GNU_SOURCE
          #include <sys/utsname.h>
          #include <dlfcn.h>
          #include <string.h>

          int uname(struct utsname *buf) {
              static int (*orig_uname)(struct utsname *) = NULL;
              if (!orig_uname) orig_uname = dlsym(RTLD_NEXT, "uname");
              int ret = orig_uname(buf);
              strcpy(buf->release, "5.4.0-fake");
              return ret;
          }
          EOF
          arm-linux-gnueabihf-gcc -shared -fPIC -ldl uname_hack.c -o libfakeuname.so
          file libfakeuname.so

      - name: 静态编译 mihomo armv7 二进制
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: arm
          GOARM: 7
          CC: arm-linux-gnueabihf-gcc
          CXX: arm-linux-gnueabihf-g++
          GO111MODULE: on
        run: |
          cd mihomo
          go build \
            -ldflags "-w -s -X github.com/metacubex/mihomo/constant.Version=v1.19.25" \
            -tags "no_gvisor no_tun_newapi" \
            -o ../mihomo-linux-armv7-static
          cd ..
          chmod +x mihomo-linux-armv7-static
          file mihomo-linux-armv7-static

      - name: 打包发布制品
        run: |
          mkdir -p release
          cp mihomo-linux-armv7-static release/
          cp libfakeuname.so release/
          
          cat > release/run.sh <<'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          export LD_PRELOAD="$SCRIPT_DIR/libfakeuname.so"
          exec "$SCRIPT_DIR/mihomo-linux-armv7-static" -d "$SCRIPT_DIR/config" "$@"
          EOF
          chmod +x release/run.sh
          
          tar -zcf mihomo-armv7-linux4.4.tar.gz -C release .
          ls -lh mihomo-armv7-linux4.4.tar.gz

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-armv7-linux4.4
          path: mihomo-armv7-linux4.4.tar.gz
