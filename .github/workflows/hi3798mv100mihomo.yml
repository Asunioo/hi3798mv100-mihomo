name: Build Mihomo armv7 for Linux 4.4 (Dispatch)

on:
  repository_dispatch:
    types: [mihomo_release]

  workflow_dispatch:
    inputs:
      tag:
        description: '指定构建版本（可选）'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 当前仓库
        uses: actions/checkout@v4

      - name: 打印事件（调试用）
        run: echo '${{ toJson(github.event) }}'

      - name: 确定版本号
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            TAG="${{ github.event.client_payload.tag }}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
              | grep -oP '"tag_name": "\K(.*)(?=")')
          fi

          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "❌ 获取版本失败"
            exit 1
          fi

          echo "构建版本: $TAG"
          echo "latest_tag=$TAG" >> $GITHUB_OUTPUT

      - name: 安装工具链
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-linux-gnueabihf libc6-dev-armhf-cross wget tar jq

      - name: 配置 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: 下载源码
        run: |
          TAG="${{ steps.get_version.outputs.latest_tag }}"
          wget -O src.tar.gz "https://github.com/MetaCubeX/mihomo/archive/refs/tags/${TAG}.tar.gz"
          tar -zxf src.tar.gz
          SRC_DIR=$(ls -d mihomo-* | head -n 1)
          mv "$SRC_DIR" mihomo

      - name: 编译 uname hack
        run: |
          cat > uname_hack.c <<'EOF'
          #define _GNU_SOURCE
          #include <sys/utsname.h>
          #include <dlfcn.h>
          #include <string.h>

          int uname(struct utsname *buf) {
              static int (*orig_uname)(struct utsname *) = NULL;
              if (!orig_uname) orig_uname = dlsym(RTLD_NEXT, "uname");
              int ret = orig_uname(buf);
              strcpy(buf->release, "5.4.0-fake");
              return ret;
          }
          EOF
          arm-linux-gnueabihf-gcc -shared -fPIC -ldl uname_hack.c -o libfakeuname.so

      - name: 编译 mihomo
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: arm
          GOARM: 7
          CC: arm-linux-gnueabihf-gcc
        run: |
          cd mihomo
          TAG="${{ steps.get_version.outputs.latest_tag }}"
          go build \
            -ldflags "-w -s -X github.com/metacubex/mihomo/constant.Version=${TAG} -linkmode external -extldflags '-static'" \
            -tags "no_gvisor no_tun_newapi" \
            -o ../mihomo-linux-armv7-static
          cd ..

      - name: 打包
        run: |
          TAG="${{ steps.get_version.outputs.latest_tag }}"
          mkdir release
          cp mihomo-linux-armv7-static release/
          cp libfakeuname.so release/

          cat > release/run.sh <<'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          export LD_PRELOAD="$DIR/libfakeuname.so"
          exec "$DIR/mihomo-linux-armv7-static" -d "$DIR"
          EOF

          chmod +x release/run.sh
          tar -zcf "mihomo-${TAG}-armv7-linux4.4.tar.gz" -C release .

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-${{ steps.get_version.outputs.latest_tag }}-armv7
          path: mihomo-${{ steps.get_version.outputs.latest_tag }}-armv7-linux4.4.tar.gz
