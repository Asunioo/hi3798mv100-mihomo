name: Build Mihomo armv7 Linux Static
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mihomo source
        uses: actions/checkout@v4
        with:
          repository: MetaCubeX/mihomo
          ref: main
          path: mihomo

      # 1. 准备Go环境
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23
          cache: true

      # 2. 编译uname-hack静态库，用于LD_PRELOAD伪装内核版本
      - name: Build uname fake lib for Linux4.4
        run: |
          cat > uname_hack.c <<'EOF'
          #define _GNU_SOURCE
          #include <sys/utsname.h>
          #include <dlfcn.h>
          #include <string.h>

          int uname(struct utsname *buf) {
            static int (*orig_uname)(struct utsname *) = NULL;
            if (!orig_uname) orig_uname = dlsym(RTLD_NEXT, "uname");
            int ret = orig_uname(buf);
            // 伪装内核版本 >=5.4 绕过mihomo/go内核检测
            strcpy(buf->release, "5.4.0");
            return ret;
          }
          EOF
          gcc -shared -fPIC -ldl uname_hack.c -o libfakeuname.so
          ls -lh libfakeuname.so

      # 3. 编译armv7静态mihomo
      - name: Compile static armv7 binary
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: arm
          GOARM: 7
          # 关闭新内核特性
          CFLAGS: "-static -O2 -march=armv7-a -mtune=cortex-a9"
          LDFLAGS: "-linkmode external -extldflags '-static'"
        run: |
          cd mihomo
          # 构建参数：关闭tun新特性、静态全打包
          go build \
            -ldflags "-w -s -X github.com/metacubex/mihomo/constant.Version=$(git describe --tags --always)" \
            -tags "no_gvisor no_tun_newapi" \
            -o ../mihomo-linux-armv7-static
          cd ..
          chmod +x mihomo-linux-armv7-static
          file mihomo-linux-armv7-static

      # 4. 打包二进制+伪装库（部署到机顶盒一并上传）
      - name: Archive artifacts
        run: |
          mkdir output
          cp mihomo-linux-armv7-static output/
          cp libfakeuname.so output/
          tar -zcf mihomo-armv7-linux4.4.tar.gz output/

      # 5. 上传制品
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-armv7-linux44
          path: mihomo-armv7-linux4.4.tar.gz
