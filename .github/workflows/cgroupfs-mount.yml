name: Build cgroupfs-mount for Debian 13

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 【修复1】添加环境变量，强制 GitHub Actions 使用 Node.js 24 运行，消除弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-debian-13:
    runs-on: ubuntu-latest
    
    # 使用官方的 Debian 13 (trixie) 容器作为构建环境
    container:
      image: debian:trixie
      
    steps:
      # 1. 检出当前仓库的代码
      - name: Checkout repository
        uses: actions/checkout@v4
        
      # 2. 更新软件源并安装必要的构建工具链
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            devscripts \
            dpkg-dev \
            fakeroot \
            debhelper \
            git
            
      # 3. 获取上游源码并进行编译打包
      - name: Build Debian package from GitHub
        run: |
          # 克隆上游源码仓库（Docker官方维护版本）
          git clone https://github.com/tianon/cgroupfs-mount.git
          cd cgroupfs-mount
          
          # 【修复2】清理可能存在的旧构建残留，防止 debuild 报错中断
          rm -rf ../*.deb ../*.changes ../*.buildinfo || true
          
          # 执行本地编译打包（跳过 GPG 签名步骤）
          debuild -us -uc -b
          
          # 列出上级目录的文件，方便在 CI 日志中排查是否生成了 .deb 包
          echo "=== Files in parent directory ==="
          ls -la ..
          
          # 【修复3】安全地将上一级目录生成的 .deb 包移动到当前工作区根目录下
          # 避免 upload-artifact@v4 不支持 '..' 相对路径的问题
          find .. -maxdepth 1 -name "*.deb" -exec mv {} ./ \;
          
      # 4. 将编译生成的 .deb 安装包作为 Artifact 上传保存
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cgroupfs-mount-deb
          # 现在直接使用当前目录下的通配符匹配即可
          path: "*.deb"
