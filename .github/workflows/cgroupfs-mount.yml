name: Build cgroupfs-mount for Debian 13

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-debian-13:
    runs-on: ubuntu-latest
    
    # 使用官方的 Debian 13 (trixie) 容器作为构建环境
    container:
      image: debian:trixie
      
    steps:
      # 1. 检出当前仓库的代码
      - name: Checkout repository
        uses: actions/checkout@v5
        
      # 2. 更新软件源并安装必要的构建工具链
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            devscripts \
            dpkg-dev \
            fakeroot \
            debhelper \
            git
            
      # 3. 获取上游源码并直接编译打包（无需 dh_make）
      - name: Build Debian package
        run: |
          # 克隆上游源码仓库（该仓库已自带 debian/ 目录）
          git clone https://github.com/tianon/cgroupfs-mount.git
          cd cgroupfs-mount
          
          # 【核心修复】跳过 GPG 签名，直接使用上游自带的 debian/ 目录进行二进制打包
          debuild -us -uc -b
          
          # 列出父目录的文件，方便在 CI 日志中排查是否生成了 .deb 包
          echo "=== Generated Packages ==="
          ls -la ../*.deb || echo "Warning: No deb files generated!"
          
      # 4. 将编译生成的 .deb 安装包作为 Artifact 上传保存
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: cgroupfs-mount-deb
          # debuild 默认会将产物输出到源码目录的上一级
          path: "../*.deb"
          retention-days: 7
